# Replace the hostname and certificate paths. Gunicorn must listen only on
# 127.0.0.1:8080. Required modules: ssl, proxy, proxy_http, headers, auth_basic.
<VirtualHost *:80>
    ServerName rss.example.com
    Redirect permanent / https://rss.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName rss.example.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/rss.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/rss.example.com/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/ retry=0 timeout=300
    ProxyPassReverse / http://127.0.0.1:8080/
    RequestHeader set X-Forwarded-Proto "https"

    <Location />
        AuthType Basic
        AuthName "DistillFeed"
        AuthUserFile /etc/apache2/rssreader.htpasswd
        Require valid-user
    </Location>

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Frame-Options "DENY"

    ErrorLog ${APACHE_LOG_DIR}/rssreader-error.log
    CustomLog ${APACHE_LOG_DIR}/rssreader-access.log combined
</VirtualHost>
