name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test,server]"
      - run: python -m pytest
      - run: python -m compileall -q rss_reader distillfeed_arxiv
      - run: node --check rss_reader/static/app.js
      - run: node --check rss_reader/static/ai.js
      - run: node --check rss_reader/static/summary.js
      - run: node --check rss_reader/static/notifications.js
      - run: sh -n deployment/start.sh
      - run: python -m pip check
      - run: python -m pip wheel --no-deps --wheel-dir dist .
